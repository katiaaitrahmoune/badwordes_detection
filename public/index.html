<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat — Dev Test UI</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3e;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --text: #e2e8f0;
    --muted: #6b7280;
    --msg-own: #6c63ff22;
    --msg-other: #1e2130;
    --green: #22c55e;
    --yellow: #facc15;
    --red: #ef4444;
  }

  body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

  header { padding: 14px 20px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  header .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  header h1 { font-size: 14px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }
  header .room-badge { margin-left: auto; font-size: 11px; background: var(--border); padding: 3px 10px; border-radius: 20px; color: var(--muted); }

  /* Notification permission banner */
  #notifBanner {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    background: #1e1a00;
    border-bottom: 1px solid var(--yellow);
    font-size: 12px;
    color: var(--yellow);
  }
  #notifBanner.show { display: flex; }
  #notifBanner button {
    padding: 4px 14px;
    border-radius: 6px;
    border: 1px solid var(--yellow);
    background: transparent;
    color: var(--yellow);
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    transition: background .2s;
  }
  #notifBanner button:hover { background: var(--yellow); color: #000; }
  #notifBanner .dismiss { margin-left: auto; border: none; color: var(--muted); font-size: 16px; background: none; cursor: pointer; }

  /* Notification status pill */
  #notifStatus {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  #notifStatus.granted  { background: #14532d; color: var(--green); }
  #notifStatus.denied   { background: #450a0a; color: var(--red); }
  #notifStatus.default  { background: #1c1917; color: var(--yellow); }

  .layout { display: flex; flex: 1; overflow: hidden; }

  .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 16px; gap: 16px; }
  .sidebar h2 { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .sidebar input, .sidebar button { width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 13px; font-family: inherit; }
  .sidebar button { background: var(--accent); border-color: var(--accent); cursor: pointer; font-weight: bold; letter-spacing: 1px; transition: opacity .2s; }
  .sidebar button:hover { opacity: .85; }
  .sidebar button.danger { background: var(--accent2); border-color: var(--accent2); }
  #userList { list-style: none; display: flex; flex-direction: column; gap: 6px; }
  #userList li { font-size: 12px; padding: 6px 8px; background: var(--bg); border-radius: 6px; border-left: 3px solid var(--accent); color: var(--muted); }
  #userList li.me { border-left-color: var(--accent2); color: var(--text); }

  .chat { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg { max-width: 70%; padding: 10px 14px; border-radius: 10px; font-size: 13px; line-height: 1.5; animation: fadeIn .2s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
  .msg.own { align-self: flex-end; background: var(--msg-own); border: 1px solid var(--accent); }
  .msg.other { align-self: flex-start; background: var(--msg-other); border: 1px solid var(--border); }
  .msg .meta { font-size: 10px; color: var(--muted); margin-bottom: 4px; display: flex; gap: 8px; }
  .msg.own .meta { justify-content: flex-end; }
  .msg .meta .name { color: var(--accent); }
  .msg.own .meta .name { color: var(--accent2); }
  .system-msg { align-self: center; font-size: 11px; color: var(--muted); background: var(--border); padding: 3px 12px; border-radius: 20px; letter-spacing: 1px; }

  #typingIndicator { padding: 4px 20px; font-size: 11px; color: var(--muted); min-height: 20px; font-style: italic; }

  .input-bar { padding: 12px 20px; background: var(--surface); border-top: 1px solid var(--border); display: flex; gap: 10px; }
  #msgInput { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; font-family: inherit; outline: none; transition: border-color .2s; }
  #msgInput:focus { border-color: var(--accent); }
  #sendBtn { padding: 10px 20px; background: var(--accent); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-family: inherit; font-weight: bold; transition: opacity .2s; }
  #sendBtn:hover { opacity: .85; }

  #joinOverlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .join-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 360px; display: flex; flex-direction: column; gap: 16px; }
  .join-card h2 { font-size: 18px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }
  .join-card p { font-size: 12px; color: var(--muted); }
  .join-card input { padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; font-family: inherit; outline: none; }
  .join-card input:focus { border-color: var(--accent); }
  .join-card button { padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-family: inherit; font-weight: bold; letter-spacing: 1px; transition: opacity .2s; }
  .join-card button:hover { opacity: .85; }
</style>
</head>
<body>

<!-- JOIN SCREEN -->
<div id="joinOverlay">
  <div class="join-card">
    <h2>// Chat Dev</h2>
    <p>Backend test interface. Enter credentials to connect.</p>
    <input id="usernameInput" placeholder="Username" />
    <input id="roomInput" placeholder="Room ID (e.g. general)" value="general" />
    <button onclick="joinRoom()">Connect →</button>
  </div>
</div>

<!-- NOTIFICATION PERMISSION BANNER -->
<div id="notifBanner">
  <span>🔔 Enable browser notifications to get alerted when you receive messages.</span>
  <button onclick="requestNotifPermission()">Enable</button>
  <button class="dismiss" onclick="dismissBanner()">✕</button>
</div>

<!-- MAIN UI -->
<header>
  <div class="dot"></div>
  <h1>// Socket Chat</h1>
  <span id="notifStatus" class="default">notif: ?</span>
  <span class="room-badge" id="roomLabel">not connected</span>
</header>

<div class="layout">
  <aside class="sidebar">
    <div>
      <h2>Users</h2>
      <ul id="userList"></ul>
    </div>
    <div style="margin-top:auto; display:flex; flex-direction:column; gap:8px;">
      <h2>Debug</h2>
      <button onclick="showRooms()">List Rooms (REST)</button>
      <button class="danger" onclick="leaveRoom()">Disconnect</button>
    </div>
  </aside>

  <div class="chat">
    <div id="messages"></div>
    <div id="typingIndicator"></div>
    <div class="input-bar">
      <input id="msgInput" placeholder="Type a message..." autocomplete="off" />
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<script>
  let socket = null;
  let myUsername = '';
  let myRoom = '';
  let typingTimer;

  // ── Notifications ──────────────────────────────────────────────────────────

  function updateNotifStatus() {
    const el = document.getElementById('notifStatus');
    const p = Notification.permission;  // 'granted' | 'denied' | 'default'
    el.className = p;
    el.textContent = `notif: ${p}`;
  }

  function showNotifBanner() {
    if (Notification.permission === 'default') {
      document.getElementById('notifBanner').classList.add('show');
    }
  }

  function dismissBanner() {
    document.getElementById('notifBanner').classList.remove('show');
  }

  async function requestNotifPermission() {
    const permission = await Notification.requestPermission();
    updateNotifStatus();
    dismissBanner();
    if (permission === 'granted') {
      // Send a confirmation notification so the user knows it works
      new Notification('✅ Notifications enabled!', {
        body: "You'll be notified when someone sends you a message.",
        icon: 'https://cdn-icons-png.flaticon.com/512/4470/4470097.png',
      });
    }
  }

  function sendPushNotification(username, content, room) {
    if (Notification.permission !== 'granted') return;
    // Only fire when the tab is in the background
    if (!document.hidden) return;

    const notif = new Notification(`💬 ${username} in #${room}`, {
      body: content,
      icon: 'https://cdn-icons-png.flaticon.com/512/4470/4470097.png',
      tag: 'chat-message',   // replaces the previous notification instead of stacking
      renotify: true,        // still plays the sound/vibration even with same tag
    });

    // Clicking the notification focuses the tab
    notif.onclick = () => {
      window.focus();
      notif.close();
    };

    // Auto-close after 5 seconds
    setTimeout(() => notif.close(), 5000);
  }

  // ── Connect & Join ─────────────────────────────────────────────────────────

  function joinRoom() {
    const username = document.getElementById('usernameInput').value.trim();
    const roomId   = document.getElementById('roomInput').value.trim();
    if (!username || !roomId) return alert('Fill in username and room');

    myUsername = username;
    myRoom     = roomId;

    socket = io();
    bindEvents();
    socket.emit('join_room', { username, roomId, roomName: roomId });
    document.getElementById('joinOverlay').style.display = 'none';

    updateNotifStatus();
    showNotifBanner();
  }

  function leaveRoom() {
    socket?.disconnect();
    location.reload();
  }

  // ── Send ───────────────────────────────────────────────────────────────────

  function sendMessage() {
    const input = document.getElementById('msgInput');
    const content = input.value.trim();
    if (!content) return;
    socket.emit('send_message', { content });
    input.value = '';
    stopTyping();
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('msgInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendMessage();
    });
    document.getElementById('msgInput').addEventListener('input', () => {
      socket?.emit('typing', { isTyping: true });
      clearTimeout(typingTimer);
      typingTimer = setTimeout(stopTyping, 1500);
    });
  });

  function stopTyping() {
    socket?.emit('typing', { isTyping: false });
  }

  // ── Socket Events ──────────────────────────────────────────────────────────

  function bindEvents() {
    socket.on('joined', ({ roomId, roomName, history }) => {
      document.getElementById('roomLabel').textContent = `# ${roomName}`;
      history.forEach(renderMessage);
      scrollBottom();
    });

    socket.on('new_message', (msg) => {
      renderMessage(msg);
      // Only notify for messages from OTHER people
      if (msg.username !== myUsername) {
        sendPushNotification(msg.username, msg.content, myRoom);
      }
    });

    socket.on('user_joined', ({ username }) => addSystem(`${username} joined`));
    socket.on('user_left',   ({ username }) => addSystem(`${username} left`));

    socket.on('room_users', (users) => {
      const ul = document.getElementById('userList');
      ul.innerHTML = '';
      users.forEach(u => {
        const li = document.createElement('li');
        li.textContent = u.username;
        if (u.username === myUsername) li.classList.add('me');
        ul.appendChild(li);
      });
    });

    socket.on('user_typing', ({ username, isTyping }) => {
      document.getElementById('typingIndicator').textContent = isTyping ? `${username} is typing...` : '';
    });

    socket.on('error', ({ message }) => addSystem(`⚠ ${message}`));
    socket.on('disconnect', () => addSystem('Disconnected from server'));
  }

  // ── Render ─────────────────────────────────────────────────────────────────

  function renderMessage(msg) {
    const isOwn = msg.username === myUsername;
    const wrap = document.createElement('div');
    wrap.className = `msg ${isOwn ? 'own' : 'other'}`;
    const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    wrap.innerHTML = `
      <div class="meta">
        <span class="name">${escHtml(msg.username)}</span>
        <span>${time}</span>
      </div>
      ${escHtml(msg.content)}
    `;
    document.getElementById('messages').appendChild(wrap);
    scrollBottom();
  }

  function addSystem(text) {
    const el = document.createElement('div');
    el.className = 'system-msg';
    el.textContent = text;
    document.getElementById('messages').appendChild(el);
    scrollBottom();
  }

  function scrollBottom() {
    const m = document.getElementById('messages');
    m.scrollTop = m.scrollHeight;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function showRooms() {
    const res = await fetch('/api/rooms');
    const data = await res.json();
    alert(JSON.stringify(data, null, 2));
  }

  window.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('joinOverlay').style.display !== 'none') joinRoom();
  });

  updateNotifStatus();
</script>
</body>
</html>
